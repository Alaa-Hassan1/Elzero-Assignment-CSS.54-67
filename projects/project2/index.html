<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <form action="" class="page">
        <div class="logos">
            <div class="face">Login to Facebook</div>
            <div class="twitter">Login to Twitter</div>
        </div>

        <div class="or">Or</div>

        <div class="user">
            <input type="text" placeholder="Username" required>
            <input type="password" required>
        </div>

        <div class="sign">
            <div class="group-keep">
                <input type="checkbox">
                <label>Keep me signed in</label>
            </div>
            <div class="forgot">Forgot Your Password?</div>
        </div>

        <input type="submit" value="Login" class="login">
        <div class="member">Not a member ? <span class="span">Sign up now!</span></div>
    </form>
</body>

</html>
